                    { formula: "F = Bqv \\sin \\theta", label: "චලනය වන ආරෝපණයක් මත බලය", details: "B - චුම්බක ස්‍රාව ඝනත්වය" },
                    { formula: "F = BIL \\sin \\theta", label: "ධාරාධාරක සන්නායකයක් මත බලය", details: "L - සන්නායකයේ දිග" },
                    { formula: "\\Phi = BA \\cos \\theta", label: "චුම්බක ස්‍රාවය", details: "\\Phi - චුම්බක ස්‍රාවය (Weber)" },
                    { formula: "\\epsilon = -N \\frac{d\\Phi}{dt}", label: "ෆැරඩේ නියමය (ප්‍රේරිත e.m.f)", details: "N - දඟර වට ගණන" },
                    { formula: "\\frac{V_s}{V_p} = \\frac{N_s}{N_p} = \\frac{I_p}{I_s}", label: "පරිණාමක (Transformer)", details: "s - ද්විතීයික, p - ප්‍රාථමික" }
                ]
            },
            {
                id: 6,
                title: "ධාරා විද්‍යුතය (Current Electricity)",
                icon: "zap",
                equations: [
                    { formula: "V = IR", label: "ඕම්ගේ නියමය", details: "R - ප්‍රතිරෝධය" },
                    { formula: "R = \\frac{\\rho l}{A}", label: "ප්‍රතිරෝධය සහ ප්‍රතිරෝධකතාව", details: "\\rho - ප්‍රතිරෝධකතාව" },
                    { formula: "R_{සමක} = R_1 + R_2 ...", label: "ශ්‍රේණිගත ප්‍රතිරෝධක", details: "ප්‍රතිරෝධයන්ගේ එකතුව" },
                    { formula: "\\frac{1}{R_{සමක}} = \\frac{1}{R_1} + \\frac{1}{R_2} ...", label: "සමාන්තරගත ප්‍රතිරෝධක", details: "ප්‍රතිලෝමයන්ගේ එකතුව" },
                    { formula: "P = VI = I^2R = \\frac{V^2}{R}", label: "විද්‍යුත් ක්ෂමතාව", details: "වැය වන විද්‍යුත් ශක්තියේ සීඝ්‍රතාව" },
                    { formula: "\\sum I = 0", label: "කර්චොෆ්ගේ 1 වන නියමය (සන්ධි)", details: "ආරෝපණ සංස්ථිති නියමය" },
                    { formula: "\\sum \\epsilon = \\sum IR", label: "කර්චොෆ්ගේ 2 වන නියමය (පුඩුව)", details: "ශක්ති සංස්ථිති නියමය" }
                ]
            },
            {
                id: 7,
                title: "පදාර්ථය සහ විකිරණය (Matter & Radiation)",
                icon: "atom",
                equations: [
                    { formula: "E = \\frac{\\text{ප්‍රත්‍යාබලය}}{\\text{වික්‍රියාව}} = \\frac{F/A}{e/L}", label: "යං මාපාංකය", details: "Stress - ප්‍රත්‍යාබලය, Strain - වික්‍රියාව" },
                    { formula: "U = \\frac{1}{2}Fe", label: "ඇදුනු කම්බියක ශක්තිය", details: "e - ප්‍රසාරණය" },
                    { formula: "E = hf = \\frac{hc}{\\lambda}", label: "ෆෝටෝන ශක්තිය", details: "h - ප්ලාන්ක් නියතය" },
                    { formula: "hf = \\Phi + \\frac{1}{2}mv_{උපරිම}^2", label: "ප්‍රකාශ විද්‍යුත් සමීකරණය", details: "\\Phi - වැඩ ශ්‍රිතය" },
                    { formula: "E = mc^2", label: "ස්කන්ධ-ශක්ති සම්බන්ධතාව", details: "අයින්ස්ටයින්ගේ සමීකරණය" },
                    { formula: "A = \\lambda N", label: "විකිරණශීලී ක්‍රියාකාරීත්වය", details: "\\lambda - ක්ෂය නියතය, N - පරමාණු ගණන" },
                    { formula: "N = N_0 e^{-\\lambda t}", label: "විකිරණශීලී ක්ෂය වීමේ නියමය", details: "N_0 - ආරම්භක පරමාණු ගණන" },
                    { formula: "T_{1/2} = \\frac{\\ln 2}{\\lambda} \\approx \\frac{0.693}{\\lambda}", label: "අර්ධ ආයු කාලය", details: "ක්‍රියාකාරීත්වය අඩක් වීමට ගතවන කාලය" }
                ]
            }
        ];

        let activeCategory = 'සියල්ල';
        let searchTerm = '';

        function init() {
            renderCategories();
            renderContent();
            setupEventListeners();
            lucide.createIcons();
        }

        function renderCategories() {
            const container = document.getElementById('categoryContainer');
            const categories = ['සියල්ල', ...PHYSICS_DATA.map(unit => unit.title)];
            
            container.innerHTML = categories.map(cat => `
                <button
                    onclick="setCategory('${cat}')"
                    class="category-btn px-5 py-2 rounded-xl text-xs font-bold whitespace-nowrap transition-all duration-200 ${
                        activeCategory === cat 
                            ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/30' 
                            : 'bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700'
                    }"
                    data-category="${cat}"
                >
                    ${cat}
                </button>
            `).join('');
        }

        function renderContent() {
            const mainContent = document.getElementById('mainContent');
            const filteredData = PHYSICS_DATA.map(unit => ({
                ...unit,
                equations: unit.equations.filter(eq => 
                    eq.label.toLowerCase().includes(searchTerm.toLowerCase()) || 
                    eq.details.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    unit.title.toLowerCase().includes(searchTerm.toLowerCase())
                )
            })).filter(unit => 
                (activeCategory === 'සියල්ල' || unit.title === activeCategory) && 
                unit.equations.length > 0
            );

            if (filteredData.length === 0) {
                mainContent.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-32 text-center">
                        <div class="bg-slate-100 dark:bg-slate-800 p-8 rounded-full mb-6">
                            <i data-lucide="search" class="w-12 h-12 text-slate-300"></i>
                        </div>
                        <h3 class="text-xl font-bold mb-2">ප්‍රතිඵල නැත</h3>
                        <p class="text-slate-500 max-w-xs">සමීකරණ පද්ධතියේ නැතහොත් වෙනත් නමකින් සොයා බලන්න.</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            mainContent.innerHTML = filteredData.map(unit => `
                <section class="fade-in-section mb-16">
                    <div class="flex items-center gap-4 mb-8">
                        <div class="w-12 h-12 flex items-center justify-center bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 text-blue-500">
                            <i data-lucide="${unit.icon}"></i>
                        </div>
                        <div>
                            <h2 class="text-2xl font-black text-slate-800 dark:text-white leading-tight">
                                ${unit.title}
                            </h2>
                            <div class="h-1 w-12 bg-blue-500 rounded-full mt-1"></div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                        ${unit.equations.map(eq => `
                            <div class="bg-white dark:bg-slate-800 p-5 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm hover:shadow-xl transition-all duration-300 group">
                                <div class="flex justify-between items-start mb-2">
                                    <div class="text-[10px] font-bold text-blue-600 dark:text-blue-400 uppercase tracking-widest bg-blue-50 dark:bg-blue-900/30 px-2 py-1 rounded">
                                        ${eq.label}
                                    </div>
                                    <i data-lucide="info" class="w-4 h-4 text-slate-300 group-hover:text-blue-400 cursor-help"></i>
                                </div>
                                
                                <div class="my-2 text-xl md:text-2xl py-4 overflow-x-auto no-scrollbar min-h-[4rem] flex items-center justify-center text-slate-900 dark:text-white">
                                    <div class="latex-container" data-formula="${eq.formula}"></div>
                                </div>
                                
                                <div class="text-xs leading-relaxed text-slate-500 dark:text-slate-400 border-t border-slate-50 dark:border-slate-700 pt-3 italic">
                                    ${eq.details}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </section>
            `).join('');

            // Render Math
            document.querySelectorAll('.latex-container').forEach(container => {
                const formula = container.getAttribute('data-formula');
                try {
                    katex.render(formula, container, {
                        throwOnError: false,
                        displayMode: true
                    });
                } catch (e) {
                    container.innerHTML = `<span class="text-red-500 text-xs">${formula}</span>`;
                }
            });

            lucide.createIcons();
            
            // Intersection Observer for fade-in effect
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.fade-in-section').forEach(section => observer.observe(section));
        }

        function setCategory(cat) {
            activeCategory = cat;
            renderCategories();
            renderContent();
        }

        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', (e) => {
                searchTerm = e.target.value;
                renderContent();
            });
        }

        // Initialize on load
        window.onload = init;
    </script>
</body>
</html>
